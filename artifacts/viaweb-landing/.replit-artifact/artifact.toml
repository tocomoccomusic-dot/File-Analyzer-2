kind = "web"
previewPath = "/"
title = "Viaweb Landing Page"
version = "1.0.0"
id = "artifacts/viaweb-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18203

[services.development]
run = "pnpm --filter @workspace/viaweb-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/viaweb-landing", "run", "build" ]
publicDir = "artifacts/viaweb-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18203"
BASE_PATH = "/"
